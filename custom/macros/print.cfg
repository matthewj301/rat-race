# =====================
# PRINT_START (Beacon-aware, KAMP-aware, no hard-coded units)
# =====================
[gcode_macro PRINT_START]
description: Start the print
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set vars = printer["gcode_macro _PRINTER_VARS"] %}
  {% set bed_temp = params.BED_TEMP|default(0)|float %}
  {% set hotend_temp = params.HOTEND_TEMP|default(0)|float %}
  {% set chamber_temp = params.TARGET_CHAMBER_TEMP|default(0)|float %}
  {% set material = params.MATERIAL | default(vars.default_material) %}
  {% set initial_tool = params.TOOL|default("0")|int %}
  {% set travel_accel = vars.travel_accel|float %}
  {% set saved_accel = printer.toolhead.max_accel %}

  MAYBE_HOME
  SYNC_MOTORS ACCEL_CHIP=beacon RETRIES=8

  SAVE_VARIABLE VARIABLE=current_material VALUE='"{material}"'

  CLEAR_PAUSE
  RESET_MULTIPLIERS

  G90

  BED_MESH_CLEAR
  SET_GCODE_OFFSET Z=0

  # PREHEAT orchestrates heating and (for high-temp) toolhead-assisted mixing at contact cal temp
  PREHEAT BED_TEMP={bed_temp} HOTEND_TEMP={printer["gcode_macro BEACON_VARS"].beacon_contact_calibration_temp|int} MATERIAL="{material}" QUICK=0 TARGET_CHAMBER_TEMP={chamber_temp}

  {% set contact_cal_temp = printer["gcode_macro BEACON_VARS"].beacon_contact_calibration_temp|int %}

  # Calibrate z offset with Beacon contact (must be done hot, after PREHEAT)
  G28 Z METHOD=CONTACT CALIBRATE=1

  # Level gantry
  Z_TILT_ADJUST

  # KAMP or default Beacon mesh, with quality check
  CALIBRATE_BED_MESH

  # Clean nozzle after mesh, then re-home Z for final offset
  {% if printer.configfile.config["gcode_macro CLEAN_NOZZLE"] is defined %}
    CLEAN_NOZZLE SKIP_HEATING=1
    M104 S{contact_cal_temp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={contact_cal_temp - 2}
  {% endif %}
  G28 Z METHOD=CONTACT CALIBRATE=0
  M104 S{hotend_temp}
  SET_VELOCITY_LIMIT ACCEL={travel_accel}

  # Park toolhead near print area
  {% if printer.configfile.config["gcode_macro SMART_PARK"] is defined %}
      SMART_PARK
  {% else %}
      PICK_PARK_LOCATION
  {% endif %}

  _SET_MPC_MATERIAL MATERIAL="{material}"

  SET_DISPLAY_TEXT MSG="Heating hotend to {hotend_temp}c"
  M109 S{hotend_temp}

  {% if printer.configfile.config["gcode_macro T0"] is defined %}
    SET_DISPLAY_TEXT MSG="Loading tool T{initial_tool}"
    T{initial_tool}
  {% endif %}

  # Park again after potential toolchange
  {% if printer.configfile.config["gcode_macro SMART_PARK"] is defined %}
      SMART_PARK
  {% else %}
      PICK_PARK_LOCATION
  {% endif %}

  # Apply thermal expansion compensation
  {% if printer.configfile.config["gcode_macro _BEACON_SET_NOZZLE_TEMP_OFFSET"] is defined %}
    RESPOND MSG="Setting Beacon thermal expansion compensation"
    _BEACON_SET_NOZZLE_TEMP_OFFSET
  {% endif %}

  # Purge nozzle before printing
  {% if printer.configfile.config["gcode_macro LINE_PURGE"] is defined %}
    LINE_PURGE
  {% else %}
    _FALLBACK_PURGE
  {% endif %}

  SET_VELOCITY_LIMIT ACCEL={saved_accel}

  MAYBE_LOAD_SKEW_CORRECTION

  RESPOND MSG="Starting Print..."
  SAVE_VARIABLE VARIABLE=is_printing_gcode VALUE=True

# =====================
# PRINT_END (unit-safe; avoids duplicate M84)
# =====================
[gcode_macro PRINT_END]
description: Consistent end-of-print routine. reason codes: 0 = cancelled, 1 = completed
gcode:
  {% set reason = params.REASON|default("complete")|lower %}
  {% set reason_code = 1 if reason == "complete" else 0 %}
  RESPOND MSG="Passed reason: {reason}, code: {reason_code}"

  {% set vars = printer["gcode_macro _PRINTER_VARS"] %}
  {% set retract_speed = (vars.retract_speed * 60)|int %}
  {% set retract_length = vars.end_retract_length|float %}

  M400

  TURN_PART_COOLING_FAN_OFF

  G92 E0
  {% if printer.extruder.can_extrude %}
    G91
    G1 E-{retract_length} F{retract_speed}
    G90
  {% endif %}

  PICK_PARK_LOCATION

  {% if printer.configfile.config["gcode_macro _BEACON_REMOVE_NOZZLE_TEMP_OFFSET"] is defined %}
    _BEACON_REMOVE_NOZZLE_TEMP_OFFSET
  {% endif %}

  {% if "bed_mesh" in printer.configfile.settings %}
    BED_MESH_CLEAR
  {% endif %}

  COOLDOWN_SEQUENCE QUICK={reason_code}
  DISABLE_ALL_MOTORS

  RESET_TO_START_STATE


[gcode_macro PAUSE]
rename_existing: PAUSE_BASE
gcode:
  {% if printer.pause_resume.is_paused %}
    {action_respond_info("Already paused...")}
  {% else %}

    {% set vars = printer["gcode_macro _PRINTER_VARS"] %}
    {% set mmu_active = true if printer.mmu is defined and printer.mmu.enabled else false %}
    {% set retract_speed = (vars.retract_speed * 60)|int %}
    {% set retract_length = vars.end_retract_length|float %}

    {% if mmu_active %}
      _MMU_SAVE_POSITION
    {% endif %}

    SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=printing_hotend_temp VALUE={printer['extruder'].target}
    SAVE_GCODE_STATE NAME=PAUSE
    PAUSE_BASE

    {% if not mmu_active %}
      {% if printer.extruder.can_extrude %}
        G91
        G1 E-{retract_length} F{retract_speed}
        G90
      {% endif %}
      TURN_PART_COOLING_FAN_OFF
      PICK_PARK_LOCATION
    {% endif %}

    SAVE_GCODE_STATE NAME=PAUSEPARK

    {% if printer['extruder'].target > 0 %}
      {% set standby_temp = [(printer['extruder'].target - vars.pause_standby_extruder_delta)|int, vars.pause_min_standby_temp|int]|max %}
      M104 S{standby_temp}
      RESPOND MSG="Hotend set to standby: {standby_temp}C"
    {% endif %}

    SET_IDLE_TIMEOUT TIMEOUT={vars.pause_idle_timeout}
    RESPOND MSG="Setting idle timeout to {vars.pause_idle_timeout} seconds."
  {% endif %}


[gcode_macro RESUME]
rename_existing: RESUME_BASE
variable_printing_hotend_temp: 0
gcode:
  {% if not printer.pause_resume.is_paused %}
    {action_respond_info("Not paused, ignoring RESUME")}
  {% else %}
    {% set vars = printer["gcode_macro _PRINTER_VARS"] %}
    {% set mmu_active = true if printer.mmu is defined and printer.mmu.enabled else false %}
    {% set resume_travel_speed = (vars.travel_speed / 2) %}
    {% set retract_speed = (vars.retract_speed * 60)|int %}
    {% set retract_length = vars.end_retract_length|float %}

    # Reheat — HH doesn't restore temp for user-initiated pauses
    {% if printing_hotend_temp > 0 %}
      RESPOND MSG="Resuming: heating hotend to {printing_hotend_temp}C"
      M109 S{printing_hotend_temp}
    {% endif %}

    {% if not mmu_active %}
      RESTORE_GCODE_STATE NAME=PAUSEPARK MOVE=1 MOVE_SPEED={resume_travel_speed}
      {% if printer.extruder.can_extrude %}
        G91
        G1 E{retract_length} F{retract_speed}
        G90
      {% endif %}
      RESTORE_GCODE_STATE NAME=PAUSE MOVE=1 MOVE_SPEED={resume_travel_speed}
    {% endif %}

    # Apply thermal offset AFTER restore so it isn't clobbered
    {% if printer.configfile.config["gcode_macro _BEACON_SET_NOZZLE_TEMP_OFFSET"] is defined %}
      _BEACON_SET_NOZZLE_TEMP_OFFSET
    {% endif %}

    {% if mmu_active %}
      _MMU_RESTORE_POSITION
    {% endif %}

    RESUME_BASE
  {% endif %}

[gcode_macro CANCEL_PRINT]
rename_existing: BASE_CANCEL_PRINT
description: Cancel print
gcode:
    RESPOND MSG="Print cancelled!"
    {% if printer.mmu is defined and printer.mmu.enabled %}
        MMU_TTG_MAP RESET=1 QUIET=1
    {% endif %}
    CLEAR_PAUSE
    PRINT_END REASON=cancel
    BASE_CANCEL_PRINT


[gcode_macro M600]
description: Filament change (pause + unload)
gcode:
    {% set vars = printer["gcode_macro _PRINTER_VARS"] %}
    {% set unload_len = vars.m600_unload_length|float %}
    {% set unload_feedrate = (vars.m600_unload_speed|float * 60)|int %}
    PAUSE
    {% if printer.mmu is defined and printer.mmu.enabled %}
      MMU_PAUSE
    {% elif printer.configfile.config["gcode_macro MMU_EJECT"] is defined %}
      MMU_EJECT
    {% elif printer.extruder.can_extrude %}
      G91
      G1 E-{unload_len} F{unload_feedrate}
      G90
    {% else %}
      RESPOND MSG="No filament system detected — manual change required"
    {% endif %}
