# TA = Toolhead-Assisted
# ================================
# ORCHESTRATOR
# ================================
[gcode_macro TA_CHAMBER_HEAT]
description: Stage heat/airflow, then loop full mixing patterns until chamber reaches target
gcode:
  {% set vars =  printer["gcode_macro _PRINTER_VARS"] %}
  {% set chamber_temp  = params.TARGET_CHAMBER_TEMP|default(vars.default_chamber_target)|float %}
  {% set bed_temp      = params.BED_TEMP|default(105)|float %}
  {% set hotend_temp   = params.HOTEND_TEMP|default(vars.chamber_assist_hotend_temp)|float %}
  {% set pattern_param = params.PATTERN|default("auto")|lower %}
  {% set cycle_interval_ms = (params.INTERVAL_MS|default(2)|float * 1000)|int %}

  {% set sensor_name = vars.chamber_sensor_name if vars.chamber_sensor_name is defined else "chamber" %}
  {% set sensor_key  = "temperature_sensor " ~ sensor_name %}
  {% if chamber_temp <= 0 or sensor_key not in printer %}
    {action_raise_error("Chamber sensor missing or TARGET<=0 (sensor='" ~ sensor_key ~ "')")}
  {% endif %}

  MAYBE_HOME

  RESPOND MSG="Chamber heat: pattern={pattern_param}, target={chamber_temp}C"
  M140 S{bed_temp}
  M104 S{hotend_temp}
  CHAMBER_FANS_ON
  G90

  ; Precompute motion bounds (constant for printer lifetime)
  {% set x_min = printer.toolhead.axis_minimum.x|float %}
  {% set x_max = printer.toolhead.axis_maximum.x|float %}
  {% set y_min = printer.toolhead.axis_minimum.y|float %}
  {% set y_max = printer.toolhead.axis_maximum.y|float %}
  {% set bed_size_avg = ((x_max - x_min) + (y_max - y_min)) / 2.0 %}
  {% if bed_size_avg >= 400 %}
    {% set move_speed = vars.chamber_move_speed_fast %}
    {% set bed_margin = 40 %}
  {% elif bed_size_avg >= 300 %}
    {% set move_speed = vars.chamber_move_speed_medium %}
    {% set bed_margin = 30 %}
  {% else %}
    {% set move_speed = vars.chamber_move_speed_slow %}
    {% set bed_margin = 20 %}
  {% endif %}
  {% set move_feedrate = (move_speed * 60)|int %}
  {% set safe_x_min = x_min + bed_margin %}
  {% set safe_x_max = x_max - bed_margin %}
  {% set safe_y_min = y_min + bed_margin %}
  {% set safe_y_max = y_max - bed_margin %}
  {% set center_x = (x_min + x_max)/2.0 %}
  {% set center_y = (y_min + y_max)/2.0 %}

  {% set z_req = vars.chamber_assist_z_height|float %}
  {% set z_lo  = printer.toolhead.axis_minimum.z|float + 2 %}
  {% set z_hi  = printer.toolhead.axis_maximum.z|float - 2 %}
  {% set mix_z = [[z_req, z_hi]|min, z_lo]|max %}

  G1 Z{mix_z} F{(vars.z_travel_speed*60)|int}
  M106 S{(255 * vars.chamber_assist_fan_speed)|int}
  SET_DYNAMIC_VARIABLE MACRO=TA_CHAMBER_STATE VARIABLE=stop_requested VALUE=0

  ; Hand off with precomputed bounds
  TA_CHAMBER_CYCLE SENSOR="{sensor_key}" CHAMBER_TEMP={chamber_temp} PATTERN="{pattern_param}" INTERVAL_MS={cycle_interval_ms} BED_TEMP={bed_temp} HOTEND_TEMP={hotend_temp} FEEDRATE={move_feedrate} SX_MIN={safe_x_min} SX_MAX={safe_x_max} SY_MIN={safe_y_min} SY_MAX={safe_y_max} CX={center_x} CY={center_y} MIX_Z={mix_z}

[gcode_macro TA_CHAMBER_STOP]
gcode:
  SET_DYNAMIC_VARIABLE MACRO=TA_CHAMBER_STATE VARIABLE=stop_requested VALUE=1

[gcode_macro TA_CHAMBER_STATE]
variable_stop_requested: 0
gcode:
    RESPOND MSG="{stop_requested}"

[gcode_macro TA_CHAMBER_CYCLE]
description: One full mixing pattern, wait, then re-call until chamber reaches target
gcode:
  ; Inputs passed from orchestrator
  {% set sensor_key        = params.SENSOR %}
  {% set chamber_temp      = params.CHAMBER_TEMP|float %}
  {% set pattern_name      = params.PATTERN|lower %}
  {% set cycle_interval_ms = params.INTERVAL_MS|int %}
  {% set bed_temp          = params.BED_TEMP|float %}
  {% set hotend_temp       = params.HOTEND_TEMP|float %}

  ; Precomputed bounds (passed through, not recomputed)
  {% set move_feedrate = params.FEEDRATE|int %}
  {% set safe_x_min   = params.SX_MIN|float %}
  {% set safe_x_max   = params.SX_MAX|float %}
  {% set safe_y_min   = params.SY_MIN|float %}
  {% set safe_y_max   = params.SY_MAX|float %}
  {% set center_x     = params.CX|float %}
  {% set center_y     = params.CY|float %}
  {% set mix_z        = params.MIX_Z|float %}

  ; Early stop hook
  {% set state = printer["gcode_macro TA_CHAMBER_STATE"] if "gcode_macro TA_CHAMBER_STATE" in printer else None %}
  {% if state and state.stop_requested|int == 1 %}
    TURN_PART_COOLING_FAN_OFF
    RESPOND MSG="Chamber mixing aborted by user"
  {% else %}
    ; Live chamber check (start of cycle)
    {% set at_target = (sensor_key in printer) and (printer[sensor_key].temperature|float >= chamber_temp) %}
    {% if at_target %}
      TURN_PART_COOLING_FAN_OFF
      RESPOND MSG="Chamber reached {chamber_temp|round(1)}C — mixing complete"
    {% else %}
      ; ---- run one full pattern ----
      G90
      G1 Z{mix_z} F{move_feedrate}

      {% if pattern_name == "grid" %}
        {% set gx0=safe_x_min %}{% set gx1=(safe_x_min+safe_x_max)/2 %}{% set gx2=safe_x_max %}
        {% set gy0=safe_y_min %}{% set gy1=(safe_y_min+safe_y_max)/2 %}{% set gy2=safe_y_max %}
        G1 X{gx0} Y{gy0} F{move_feedrate}  ; row 0
        G4 P200
        G1 X{gx1} Y{gy0} F{move_feedrate}
        G4 P200
        G1 X{gx2} Y{gy0} F{move_feedrate}
        G4 P200
        G1 X{gx0} Y{gy1} F{move_feedrate}  ; row 1
        G4 P200
        G1 X{gx1} Y{gy1} F{move_feedrate}
        G4 P200
        G1 X{gx2} Y{gy1} F{move_feedrate}
        G4 P200
        G1 X{gx0} Y{gy2} F{move_feedrate}  ; row 2
        G4 P200
        G1 X{gx1} Y{gy2} F{move_feedrate}
        G4 P200
        G1 X{gx2} Y{gy2} F{move_feedrate}
        G4 P200
      {% elif pattern_name == "corners" %}
        G1 X{safe_x_min} Y{safe_y_min} F{move_feedrate}
        G4 P350
        G1 X{safe_x_max} Y{safe_y_min} F{move_feedrate}
        G4 P350
        G1 X{safe_x_max} Y{safe_y_max} F{move_feedrate}
        G4 P350
        G1 X{safe_x_min} Y{safe_y_max} F{move_feedrate}
        G4 P350
        G1 X{center_x} Y{center_y} F{move_feedrate}
        G4 P250
      {% elif pattern_name == "vortex" %}
        {% set max_radius = (safe_x_max - center_x) if (safe_x_max - center_x) < (safe_y_max - center_y) else (safe_y_max - center_y) %}
        {% for ring_scale in [1.0,0.75,0.5,0.25] %}
          {% set current_radius = ring_scale*max_radius %}
          G1 X{center_x + current_radius}          Y{center_y}                       F{move_feedrate}
          G1 X{center_x + current_radius*0.707}    Y{center_y + current_radius*0.707} F{move_feedrate}
          G1 X{center_x}                           Y{center_y + current_radius}       F{move_feedrate}
          G1 X{center_x - current_radius*0.707}    Y{center_y + current_radius*0.707} F{move_feedrate}
          G1 X{center_x - current_radius}          Y{center_y}                       F{move_feedrate}
          G1 X{center_x - current_radius*0.707}    Y{center_y - current_radius*0.707} F{move_feedrate}
          G1 X{center_x}                           Y{center_y - current_radius}       F{move_feedrate}
          G1 X{center_x + current_radius*0.707}    Y{center_y - current_radius*0.707} F{move_feedrate}
        {% endfor %}
      {% else %}  ; continuous (default)
        G1 X{safe_x_min} Y{safe_y_min} F{move_feedrate}
        G1 X{safe_x_max} Y{safe_y_min} F{move_feedrate}
        G1 X{safe_x_max} Y{safe_y_max} F{move_feedrate}
        G1 X{safe_x_min} Y{safe_y_max} F{move_feedrate}
        G1 X{safe_x_min} Y{safe_y_min} F{move_feedrate}
        G1 X{center_x}   Y{safe_y_min} F{move_feedrate}
        G1 X{center_x}   Y{safe_y_max} F{move_feedrate}
        G1 X{center_x}   Y{center_y}   F{move_feedrate}
        G1 X{safe_x_min} Y{center_y}   F{move_feedrate}
        G1 X{safe_x_max} Y{center_y}   F{move_feedrate}
        G1 X{center_x}   Y{center_y}   F{move_feedrate}
        G1 X{center_x}   Y{safe_y_min} F{move_feedrate}
      {% endif %}

      ; ---- pace then recurse (pass all precomputed bounds through) ----
      G4 P{cycle_interval_ms}
      TA_CHAMBER_CYCLE SENSOR="{sensor_key}" CHAMBER_TEMP={chamber_temp} PATTERN="{pattern_name}" INTERVAL_MS={cycle_interval_ms} BED_TEMP={bed_temp} HOTEND_TEMP={hotend_temp} FEEDRATE={move_feedrate} SX_MIN={safe_x_min} SX_MAX={safe_x_max} SY_MIN={safe_y_min} SY_MAX={safe_y_max} CX={center_x} CY={center_y} MIX_Z={mix_z}
    {% endif %}
  {% endif %}
