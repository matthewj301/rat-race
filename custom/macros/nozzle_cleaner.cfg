[gcode_macro DEPLOY_NOZZLE_CLEANER]
gcode:
   RESPOND MSG="Deploying nozzle cleaner"
   SET_SERVO SERVO=servo_wiper ANGLE={printer["gcode_macro CustomVariables"].nozzle_wiper_deployed_angle}
   SET_GCODE_VARIABLE MACRO=CustomVariables VARIABLE=nozzle_wiper_state VALUE='"deployed"'
   G4 P2000


[gcode_macro STOW_NOZZLE_CLEANER] 
gcode:
   RESPOND MSG="Stowing nozzle cleaner"
   SET_SERVO SERVO=servo_wiper ANGLE={printer["gcode_macro CustomVariables"].nozzle_wiper_stowed_angle}
   SET_GCODE_VARIABLE MACRO=CustomVariables VARIABLE=nozzle_wiper_state VALUE='"stowed"'
   G4 P2000


[gcode_macro _WIPER_VARS]
variable_approach_x: 285
variable_approach_y: 240
variable_wipe_y_min: 250
variable_wipe_y_max: 280
variable_wipe_x_offsets: [-3, 0, 3]    # X offsets from approach_x for each pass
variable_clearance_x: 246
variable_clearance_y: 250
variable_servo_clearance_z: 30
variable_post_clean_z: 2
variable_wipe_fast_feedrate: 20000
variable_wipe_slow_feedrate: 10000
variable_approach_feedrate: 15000
variable_standalone_temp: 200
variable_standalone_temp_max: 270
gcode:

[gcode_macro CLEAN_NOZZLE]
gcode:
   {% set vars = printer["gcode_macro _PRINTER_VARS"] %}
   {% set wv = printer["gcode_macro _WIPER_VARS"] %}
   {% set travel_speed = vars.travel_speed %}
   {% set skip_heating = params.SKIP_HEATING|default(0)|int %}

   SAVE_GCODE_STATE NAME=nozzle_clean_state
   RESPOND MSG="Start Wiping macro"
   MAYBE_HOME

   {% if skip_heating == 0 and printer.idle_timeout.state != "Printing" %}
     RESPOND MSG="Heating extruder to {wv.standalone_temp}"
     M104 S{wv.standalone_temp}
     TEMPERATURE_WAIT SENSOR=extruder MINIMUM={wv.standalone_temp} MAXIMUM={wv.standalone_temp_max}
   {% endif %}

   RESPOND MSG="Moving to {wv.servo_clearance_z}mm for servo clearance"
   G90
   G0 Z{wv.servo_clearance_z}
   DEPLOY_NOZZLE_CLEANER

   G0 X{wv.approach_x} Y{wv.approach_y} F{wv.approach_feedrate}
   RESPOND MSG="Starting nozzle cleaning!"
   {% for x_off in wv.wipe_x_offsets %}
     {% if not loop.first %}
       G0 X{wv.approach_x + x_off} F{wv.wipe_slow_feedrate}
     {% endif %}
     {% for _ in range(3) %}
       G0 Y{wv.wipe_y_min} F{wv.wipe_fast_feedrate}
       G0 Y{wv.wipe_y_max} F{wv.wipe_slow_feedrate}
     {% endfor %}
   {% endfor %}

   G0 X{wv.clearance_x} Y{wv.clearance_y}
   STOW_NOZZLE_CLEANER
   RESPOND MSG="Nozzle cleaning done"

   RESPOND MSG="Moving bed to {wv.post_clean_z}mm from toolhead"
   G0 Z{wv.post_clean_z}

   {% if skip_heating == 0 and printer.idle_timeout.state != "Printing" %}
     RESPOND MSG="Turning off hotend"
     M104 S0
   {% endif %}

   RESTORE_GCODE_STATE NAME=nozzle_clean_state MOVE=1 MOVE_SPEED={travel_speed}


[delayed_gcode wiper]
initial_duration: 1
gcode:
   STOW_NOZZLE_CLEANER