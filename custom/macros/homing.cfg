[beacon]
home_y_before_x: True
home_gcode_post_x: _CENTER_AXIS AXIS=X
home_gcode_post_y: _CENTER_AXIS AXIS=Y

# Helper: center a single axis AFTER it’s homed (relative Δ; CoreXY-safe)
[gcode_macro _CENTER_AXIS]
description: Center a single axis after homing
gcode:
  {% set axis = params.AXIS|string|upper %}
  {% set vars  = printer["gcode_macro _PRINTER_VARS"] %}
  {% set travel_feedrate = (vars.travel_speed * 60)|int %}
  {% if axis == "X" %}
    {% set center_x = (printer.toolhead.axis_minimum.x + printer.toolhead.axis_maximum.x)/2.0 %}
    {% set delta_x = center_x - printer.gcode_move.position.x %}
    G91
    G0 X{delta_x} F{travel_feedrate}
    G90
  {% elif axis == "Y" %}
    {% set center_y = (printer.toolhead.axis_minimum.y + printer.toolhead.axis_maximum.y)/2.0 %}
    {% set delta_y = center_y - printer.gcode_move.position.y %}
    G91
    G0 Y{delta_y} F{travel_feedrate}
    G90
  {% endif %}

[gcode_macro MAYBE_HOME]
description: Only home unhomed axis
variable_is_kinematic_position_overridden: False
gcode:
  {% set svv = printer.save_variables.variables %}
  {% set is_printing_gcode = svv.is_printing_gcode %}

  {% if printer["gcode_macro MAYBE_HOME"].is_kinematic_position_overridden|lower == 'true' %}
    RESPOND MSG="SET_CENTER_KINEMATIC_POSITION has been abused. Homing all axes. Please refrain from using SET_CENTER_KINEMATIC_POSITION outside of debugging purposes."
    G28
    SET_GCODE_VARIABLE MACRO=MAYBE_HOME VARIABLE=is_kinematic_position_overridden VALUE=False
  {% elif is_printing_gcode %}
    RESPOND MSG="Currently printing, we can't home!"
  {% else %}
    {% if params.X is not defined and params.Y is not defined and params.Z is not defined %}
      {% set axes_to_home = '' %}
      {% if 'x' not in printer.toolhead.homed_axes %}
        {% set axes_to_home = axes_to_home ~ 'X ' %}
      {% endif %}
      {% if 'y' not in printer.toolhead.homed_axes %}
        {% set axes_to_home = axes_to_home ~ 'Y ' %}
      {% endif %}
      {% if 'z' not in printer.toolhead.homed_axes %}
        {% set axes_to_home = axes_to_home ~ 'Z ' %}
      {% endif %}
    {% else %}
      {% set axes_to_home = '' %}
      {% if params.X is defined and 'x' not in printer.toolhead.homed_axes %}
        {% set axes_to_home = axes_to_home ~ 'X ' %}
      {% endif %}
      {% if params.Y is defined and 'y' not in printer.toolhead.homed_axes %}
        {% set axes_to_home = axes_to_home ~ 'Y ' %}
      {% endif %}
      {% if params.Z is defined and 'z' not in printer.toolhead.homed_axes %}
        {% set axes_to_home = axes_to_home ~ 'Z ' %}
      {% endif %}
    {% endif %}
    {% if axes_to_home|length > 0 %}
      RESPOND MSG="Homing {axes_to_home}"
      G28 {axes_to_home}
    {% else %}
      RESPOND MSG="All requested axes already homed."
    {% endif %}
  {% endif %}
