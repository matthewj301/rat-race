[gcode_macro SET_X_SGT]
gcode:
    {% set stallguard_threshold = params.SGT|default(-1)|int %}
    AUTOTUNE_TMC STEPPER=stepper_x sgt={stallguard_threshold}
    AUTOTUNE_TMC STEPPER=stepper_x1 sgt={stallguard_threshold}

[gcode_macro SET_Y_SGT]
gcode:
    {% set stallguard_threshold = params.SGT|default(-1)|int %}
    AUTOTUNE_TMC STEPPER=stepper_y sgt={stallguard_threshold}
    AUTOTUNE_TMC STEPPER=stepper_y1 sgt={stallguard_threshold}

[gcode_macro SET_ALL_SGT]
gcode:
    {% set stallguard_threshold = params.SGT|default(-1)|int %}
    SET_X_SGT SGT={stallguard_threshold}
    SET_Y_SGT SGT={stallguard_threshold}
