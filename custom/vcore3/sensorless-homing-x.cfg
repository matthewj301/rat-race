# Sensorless homing for X axis
# stepper_x on Motor-1 (BTT Octopus Max EZ), DIAG jumper installed on Motor-1 pad
# Kalico: diag1_pin uses ^! because TMC5160 DIAG1 is open-drain (active-low stall signal)

[tmc5160 stepper_x]
diag1_pin: ^!PF0
driver_SGT: -64     # Tune: -64 = most sensitive, 63 = least. Increase until reliable single-touch.
home_current: 1.5   # Amps — ~58% of run_current; lower for consistent stall detection

[stepper_x]
endstop_pin: tmc5160_stepper_x:virtual_endstop
homing_retract_dist: 10
homing_speed: 20    # mm/s (rotation_distance / 2); re-tune if stalls are missed or premature
